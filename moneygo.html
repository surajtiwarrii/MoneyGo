<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MoneyGo — Trusted. Tracked. Rewarded.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Albert+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --ivory: #FBFAF7; --paper: #F3F1EC; --ink: #191C1A; --ink-soft: #5C615E;
  --line: #E4E1D9; --green: #0F4D3A; --green-deep: #0A3628; --gold: #B98A2F; --red: #9C3A2E;
  --nav-h: 64px; --bottom-nav-h: 76px;
}
* { box-sizing: border-box; }
html, body, #root { min-height: 100%; }
body { margin: 0; background: var(--ivory); color: var(--ink); font-family: "Albert Sans", sans-serif; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
.serif { font-family: "Libre Caslon Text", serif; }
.mono { font-family: "Spline Sans Mono", monospace; font-variant-numeric: tabular-nums; }
button, input, select, textarea { font-family: inherit; color: inherit; }

.page { max-width: 640px; margin: 0 auto; padding: 24px 20px calc(var(--bottom-nav-h) + 24px); }
@media (min-width: 900px) { .page { max-width: 760px; padding: 32px 32px 48px; } }
.h1 { font-size: 26px; font-weight: 400; margin: 0; }
.h2 { font-size: 22px; font-weight: 400; margin: 0; }
.sub { color: var(--ink-soft); font-size: 13.5px; margin: 6px 0 18px; line-height: 1.5; }

.icon-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line); background: #fff; color: var(--ink);
  display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: border-color .2s ease, color .2s ease;
}
.icon-btn svg { width: 18px; height: 18px; transition: transform .18s ease; }
.icon-btn:hover { border-color: var(--green); color: var(--green); }
.icon-btn:active svg { transform: scale(.8) rotate(-10deg); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px;
  background: var(--green); color: #F4F6F2; border: 0; border-radius: 12px; font: inherit; font-weight: 600;
  font-size: 15px; cursor: pointer; transition: background .2s ease, transform .15s ease;
}
.btn:hover { background: var(--green-deep); }
.btn:active { transform: scale(.99); }
.btn:disabled { background: var(--line); color: var(--ink-soft); cursor: not-allowed; }
.btn.block { width: 100%; }
.btn.outline { background: none; border: 1px solid var(--green); color: var(--green); }
.btn.outline:hover { background: var(--green); color: #fff; }
.btn svg { width: 16px; height: 16px; }

.field-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
.field-hint { font-size: 11.5px; color: var(--ink-soft); margin: 6px 2px 0; }
.input {
  width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 12px; background: #fff;
  padding: 14px 16px; font: inherit; font-size: 15px; outline: none; transition: border-color .2s ease; color: var(--ink);
}
.input:focus { border-color: var(--green); }
.textarea { min-height: 110px; resize: vertical; font-family: inherit; }
.char-count { text-align: right; font-size: 11.5px; color: var(--ink-soft); margin-top: 6px; }

.card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px; }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; padding: 7px 12px; border-radius: 999px; background: var(--paper); color: var(--ink-soft); border: 0; cursor: pointer; }
.chip.on { background: var(--green); color: #fff; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp .4s ease both; }

/* Layout */
.app-shell { min-height: 100vh; }
.app-main { padding-top: var(--nav-h); }
.mobile-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
  background: rgba(251,250,247,.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
}
.mobile-brand { font-size: 19px; }
.mobile-brand b { color: var(--green); font-weight: 700; }
@media (min-width: 900px) { .mobile-topbar { display: none; } }
.desktop-topbar { display: none; }
@media (min-width: 900px) {
  .desktop-topbar { display: block; position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: var(--nav-h); background: rgba(251,250,247,.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .desktop-topbar-inner { max-width: 1080px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
  .desktop-brand { background: none; border: 0; cursor: pointer; font-size: 20px; padding: 0; }
  .desktop-brand b { color: var(--green); font-weight: 700; }
  .desktop-nav { display: flex; gap: 28px; }
  .desktop-nav-link { font-size: 14.5px; font-weight: 500; color: var(--ink-soft); padding: 8px 0; position: relative; background: none; border: 0; cursor: pointer; }
  .desktop-nav-link.on { color: var(--green); font-weight: 600; }
  .desktop-nav-link.on::after { content: ""; position: absolute; left: 0; right: 0; bottom: -13px; height: 2px; background: var(--green); }
  .desktop-actions { display: flex; gap: 10px; }
}
.bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; background: rgba(251,250,247,.92); backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
.bottom-nav-inner { max-width: 480px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); }
.bottom-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 11px 0 9px; font-size: 11px; font-weight: 500; color: var(--ink-soft); background: none; border: 0; cursor: pointer; }
.bottom-tab svg { width: 22px; height: 22px; }
.bottom-tab.on { color: var(--green); font-weight: 600; }
@media (min-width: 900px) { .bottom-nav { display: none; } }

.page-header { display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; gap: 10px; margin-bottom: 18px; }
.page-header-title { font-size: 20px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Drawer */
.drawer-layer { position: fixed; inset: 0; z-index: 50; visibility: hidden; }
.drawer-layer.on { visibility: visible; }
.drawer-backdrop { position: absolute; inset: 0; background: rgba(10,20,16,.38); opacity: 0; transition: opacity .25s ease; cursor: pointer; }
.drawer-layer.on .drawer-backdrop { opacity: 1; }
.drawer { position: absolute; top: 0; left: 0; bottom: 0; width: min(340px, 86vw); background: var(--ivory); box-shadow: 18px 0 40px -20px rgba(0,0,0,.3); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform .28s cubic-bezier(.32,.72,0,1); }
.drawer-layer.on .drawer { transform: translateX(0); }
.drawer-top { display: flex; align-items: center; justify-content: space-between; padding: 20px 18px 16px; border-bottom: 1px solid var(--line); }
.drawer-id { display: flex; align-items: center; gap: 12px; background: none; border: 0; padding: 0; cursor: pointer; text-align: left; }
.drawer-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--paper) center/cover no-repeat; color: var(--green); display: grid; place-items: center; flex-shrink: 0; }
.drawer-name { display: block; font-size: 14.5px; font-weight: 600; color: var(--ink); }
.drawer-phone { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.drawer-body { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
.drawer-section { margin-top: 14px; }
.drawer-heading { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); padding: 0 10px 8px; }
.drawer-item { width: 100%; display: flex; align-items: center; gap: 12px; background: none; border: 0; border-radius: 11px; padding: 11px 10px; font-size: 14px; color: var(--ink); text-align: left; cursor: pointer; transition: background .15s ease; }
.drawer-item:hover { background: var(--paper); }
.drawer-item-icon { width: 30px; height: 30px; border-radius: 9px; background: var(--paper); color: var(--green); display: grid; place-items: center; flex-shrink: 0; }
.drawer-item-icon svg { width: 15px; height: 15px; }
.drawer-item-chevron { width: 13px; height: 13px; margin-left: auto; color: var(--ink-soft); flex-shrink: 0; }
.drawer-logout { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 16px 20px; padding: 13px; border-radius: 12px; border: 1px solid var(--line); background: none; color: var(--red); font-size: 14px; font-weight: 600; cursor: pointer; }
.drawer-logout svg { width: 16px; height: 16px; }
.drawer-close:hover svg { transform: rotate(90deg); }
.drawer-close:active svg { transform: rotate(90deg) scale(.8); }

/* Splash / Login */
.splash-screen { min-height: 100vh; display: grid; place-content: center; justify-items: center; background: linear-gradient(148deg, var(--green) 0%, var(--green-deep) 100%); color: #F4F6F2; }
.splash-mark { font-size: 40px; animation: mgFade .8s ease both; }
.splash-mark b { color: #D8C48B; font-weight: 700; }
.splash-tag { margin: 10px 0 0; color: #C9D6CC; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; text-align: center; animation: mgFade .8s ease .25s both; }
@keyframes mgFade { from { opacity: 0; transform: translateY(14px); } }
.login-screen { min-height: 100vh; display: flex; flex-direction: column; }
.login-art { background: linear-gradient(148deg, var(--green) 0%, var(--green-deep) 100%); color: #F4F6F2; padding: 64px 28px 44px; }
.login-mark { font-size: 32px; }
.login-mark b { color: #D8C48B; font-weight: 700; }
.login-tag { margin: 8px 0 0; color: #C9D6CC; font-size: 13.5px; letter-spacing: .04em; }
.login-panel { flex: 1; background: var(--ivory); margin-top: -18px; border-radius: 22px 22px 0 0; padding: 30px 24px 40px; max-width: 480px; width: 100%; margin-left: auto; margin-right: auto; }
@media (min-width: 900px) {
  .login-screen { flex-direction: row; }
  .login-art { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px; }
  .login-panel { flex: 1; margin-top: 0; border-radius: 0; display: flex; flex-direction: column; justify-content: center; padding: 60px; max-width: none; }
}
.login-h { font-size: 27px; font-weight: 400; margin: 0 0 8px; }
.phone-row { display: flex; gap: 10px; }
.cc { display: grid; place-items: center; padding: 0 14px; border: 1px solid var(--line); border-radius: 12px; background: #fff; font-weight: 600; color: var(--ink-soft); }
.phone-row .input { flex: 1; min-width: 0; letter-spacing: .04em; font-size: 16px; }
.otp-row { display: flex; gap: 9px; }
.otp-box { width: 100%; aspect-ratio: .84; text-align: center; border: 1px solid var(--line); border-radius: 12px; background: #fff; font-family: "Spline Sans Mono", monospace; font-size: 20px; outline: none; transition: border-color .2s ease; }
.otp-box:focus { border-color: var(--green); }
.error-text { color: var(--red); font-size: 13px; margin: 10px 0 0; }
.back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px; background: none; border: 0; padding: 0; font-size: 13.5px; color: var(--ink-soft); cursor: pointer; }
.back-link svg { width: 15px; height: 15px; }
.resend-link { display: block; margin: 16px auto 0; background: none; border: 0; font-size: 13.5px; font-weight: 600; color: var(--green); cursor: pointer; }
.resend-link:disabled { color: var(--ink-soft); font-weight: 400; cursor: default; }
.login-legal { color: var(--ink-soft); font-size: 12px; margin-top: 18px; }
.login-secure { display: flex; align-items: center; gap: 8px; margin-top: 34px; color: var(--ink-soft); font-size: 12.5px; }
.login-secure svg { width: 15px; height: 15px; color: var(--green); flex-shrink: 0; }

/* Trust line, offer cards */
.trust-line { display: flex; align-items: center; gap: 8px; margin: 4px 2px 24px; color: var(--ink-soft); font-size: 12.5px; }
.trust-line svg { width: 15px; height: 15px; color: var(--green); flex-shrink: 0; }
.offer-grid { display: grid; gap: 12px; }
@media (min-width: 720px) { .offer-grid { grid-template-columns: 1fr 1fr; } }
.offer-card {
  display: flex; align-items: center; gap: 16px; width: 100%; text-align: left; background: #fff;
  border: 1px solid var(--line); border-radius: 16px; padding: 18px; cursor: pointer; font: inherit; color: inherit;
  transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
}
.offer-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 14px 30px -22px rgba(15,77,58,.45); }
.offer-card-icon { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; background: var(--paper); color: var(--green); display: grid; place-items: center; }
.offer-card-icon svg { width: 23px; height: 23px; }
.offer-card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.offer-card-title { font-size: 16px; font-weight: 600; }
.offer-card-blurb { display: block; font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
.offer-card-meta { display: flex; gap: 12px; margin-top: 9px; font-size: 12px; }
.live-count { display: inline-flex; align-items: center; gap: 5px; color: var(--green); font-weight: 600; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.top-reward { color: var(--gold); font-weight: 600; flex-shrink: 0; white-space: nowrap; font-size: 12px; }
.offer-card-arrow { color: var(--ink-soft); transition: color .2s ease, transform .2s ease; flex-shrink: 0; }
.offer-card-arrow svg { width: 18px; height: 18px; }
.offer-card:hover .offer-card-arrow { color: var(--green); transform: translateX(3px); }

/* Category listing */
.seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--paper); border-radius: 12px; padding: 4px; }
.seg-btn { border: 0; background: none; border-radius: 9px; padding: 10px 0; font: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; transition: background .2s ease, color .2s ease; }
.seg-btn.on { background: #fff; color: var(--green); box-shadow: 0 4px 14px -8px rgba(0,0,0,.18); }
.status-chip { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 999px; background: var(--paper); color: var(--ink-soft); flex-shrink: 0; }
.status-chip.inProgress { color: var(--gold); }
.status-chip.completed { color: var(--green); }
.status-chip.expired { color: var(--red); }

/* Offer detail */
.offer-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.reward-banner { display: flex; align-items: center; justify-content: space-between; background: var(--paper); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--ink-soft); }
.reward-banner-amount { font-size: 20px; color: var(--green); }
.status-banner { display: flex; align-items: center; gap: 8px; margin-top: 14px; padding: 12px 14px; border-radius: 12px; font-size: 13px; }
.status-banner.completed { background: #EAF3EE; color: var(--green); }
.status-banner.expired { background: #F7EAE7; color: var(--red); }
.status-banner.in-progress { background: #FBF3E4; color: var(--gold); }
.step-list { margin: 0 0 16px; padding-left: 20px; color: var(--ink-soft); font-size: 13.5px; line-height: 1.8; }
.hint-card { display: flex; gap: 10px; background: var(--paper); border-radius: 12px; padding: 12px 14px; font-size: 12.5px; color: var(--ink-soft); }
.hint-card svg { color: var(--gold); flex-shrink: 0; }
.tier-list { display: grid; gap: 8px; margin: 14px 0 18px; }
.tier-row { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; }
.tier-row.done { background: #EAF3EE; border-color: #CFE3D6; }
.tier-check { width: 22px; height: 22px; border-radius: 50%; background: var(--paper); color: var(--ink-soft); display: grid; place-items: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.tier-row.done .tier-check { background: var(--green); color: #fff; }
.tier-label { flex: 1; font-size: 13.5px; }
.tier-reward { color: var(--green); font-weight: 600; }
.disclaimer { font-size: 11.5px; color: var(--ink-soft); margin: 0 0 20px; line-height: 1.6; }
.dev-row { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
.dev-link { background: none; border: 0; color: var(--ink-soft); font-size: 11.5px; text-decoration: underline; cursor: pointer; padding: 0; text-align: left; }

/* Security check */
.security-page { display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
.security-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--paper); color: var(--green); display: grid; place-items: center; margin-bottom: 18px; }
.security-icon.ok { background: #EAF3EE; }
.security-icon.blocked { background: #F7EAE7; color: var(--red); }
.check-list { list-style: none; padding: 0; margin: 22px 0 28px; width: 100%; max-width: 380px; display: grid; gap: 12px; }
.check-list li { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--ink-soft); }
.check-list li.done { color: var(--ink); }
.check-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--line); display: grid; place-items: center; flex-shrink: 0; color: var(--green); }
.check-list li.done .check-dot { background: var(--green); border-color: var(--green); color: #fff; }
.dev-toggle { display: flex; align-items: center; gap: 8px; margin-top: 20px; font-size: 12px; color: var(--ink-soft); }

/* Wallet */
.wallet-hero { position: relative; overflow: hidden; border-radius: 18px; background: linear-gradient(148deg, var(--green) 0%, var(--green-deep) 100%); color: #F4F6F2; padding: 24px 22px 20px; box-shadow: 0 18px 40px -22px rgba(10,54,40,.55); }
.wallet-hero-label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #C9D6CC; }
.wallet-hero-amount { font-size: 34px; margin-top: 10px; }
.wallet-hero-rupee { font-size: 22px; margin-right: 4px; color: #C9D6CC; }
.wallet-hero-foot { margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(244,246,242,.16); font-size: 13px; color: #C9D6CC; }
.txn-list { display: grid; gap: 10px; }
.txn-row { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; }
.txn-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--paper); color: var(--green); display: grid; place-items: center; flex-shrink: 0; }
.txn-icon svg { width: 18px; height: 18px; }
.txn-body { flex: 1; min-width: 0; }
.txn-label { display: block; font-size: 14px; font-weight: 500; }
.txn-date { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.txn-amt { font-size: 14px; color: var(--green); font-weight: 600; white-space: nowrap; }

/* Notifications */
.notif-list { display: grid; gap: 10px; }
.notif-card { display: flex; align-items: flex-start; gap: 14px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; }
.notif-body { display: block; font-size: 12.5px; color: var(--ink-soft); margin: 3px 0; line-height: 1.4; }

/* Share & Earn */
.share-offer { display: flex; flex-direction: column; gap: 12px; }
.share-offer-top { display: flex; align-items: flex-start; gap: 12px; }
.share-offer-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.offer-name-btn { display: inline-flex; align-items: center; gap: 4px; align-self: flex-start; border: 0; background: none; padding: 0; font: inherit; font-size: 14.5px; font-weight: 600; color: var(--ink); cursor: pointer; }
.offer-name-btn svg { width: 12px; height: 12px; color: var(--ink-soft); transition: transform .15s ease; }
.offer-name-btn:hover { color: var(--green); }
.offer-name-btn:hover svg { transform: translateX(2px); color: var(--green); }
.link-code-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.link-code { font-size: 12.5px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-btn { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; border: 0; background: var(--paper); color: var(--green); border-radius: 999px; padding: 5px 11px; font: inherit; font-size: 11.5px; font-weight: 600; cursor: pointer; }
.copy-btn svg { width: 12px; height: 12px; }
.link-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.link-stats { margin-top: 9px; font-size: 12px; color: var(--ink-soft); }
.link-sep { margin: 0 6px; }
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 18px; }
.stat { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; }
.stat-label { font-size: 11px; color: var(--ink-soft); letter-spacing: .04em; }
.stat-value { font-size: 19px; }
.who-list { display: grid; gap: 10px; }
.who-row { display: flex; align-items: center; gap: 14px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; }
.event-status { font-size: 10.5px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--green); }
.event-status.pending { color: var(--gold); }

/* Profile */
.avatar-block { position: relative; width: 76px; margin: 4px 0 20px; }

/* ====================== Tiny hash router (no external lib) ====================== */
function parseHash() {
  let h = window.location.hash.slice(1);
  if (!h) h = "/";
  if (!h.startsWith("/")) h = "/" + h;
  return h;
}
function navigate(to, opts) {
  const newHash = "#" + to;
  if (opts && opts.replace) {
    // history.replaceState never reloads the document (location.replace does,
    // which 404s on hosts that don't serve the reconstructed URL).
    try { window.history.replaceState(null, "", newHash); }
    catch (err) { window.location.hash = to; return; }
    window.dispatchEvent(new Event("hashchange"));
  } else if (window.location.hash === newHash) {
    window.dispatchEvent(new Event("hashchange"));
  } else {
    window.location.hash = to;
  }
}
function getSplashShown() { try { return sessionStorage.getItem("mg_splash_shown"); } catch (e) { return "1"; } }
function setSplashShown() { try { sessionStorage.setItem("mg_splash_shown", "1"); } catch (e) {} }
function goBack() { window.history.back(); }
function useRoute() {
  const [path, setPath] = useState(parseHash());
  useEffect(() => {
    const onHash = () => setPath(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return path;
}
function matchPath(pattern, path) {
  const pp = pattern.split("/").filter(Boolean);
  const sp = path.split("/").filter(Boolean);
  if (pp.length !== sp.length) return null;
  const params = {};
  for (let i = 0; i < pp.length; i++) {
    if (pp[i].startsWith(":")) params[pp[i].slice(1)] = decodeURIComponent(sp[i]);
    else if (pp[i] !== sp[i]) return null;
  }
  return params;
}

function useCountUp(target, duration) {
  duration = duration || 900;
  const [value, setValue] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min((now - start) / duration, 1);
      setValue(target * (1 - Math.pow(1 - t, 3)));
      if (t < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [target, duration]);
  return value;
}

function AppStateProvider({ children }) {
  const [phone, setPhone] = useState("");
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [name, setName] = useState("Suraj Tiwari");
  const [photo, setPhoto] = useState(null);
  const [email, setEmail] = useState("");
  const [emailStatus, setEmailStatus] = useState("unset");

  const [dob, setDob] = useState("");
  const [dobLocked, setDobLocked] = useState(false);
  const [gender, setGender] = useState("");
  const [balance, setBalance] = useState(18240.5);
  const [transactions, setTransactions] = useState(INITIAL_TRANSACTIONS);
  const [offerStatus, setOfferStatus] = useState({});

  const login = (p) => { setPhone(p); setIsAuthenticated(true); };
  const logout = () => { setIsAuthenticated(false); setPhone(""); };
  const statusKey = (c, o) => c + ":" + o;
  const getOfferStatus = (c, o) => offerStatus[statusKey(c, o)] || "live";
  const markInProgress = (c, o) => { const k = statusKey(c, o); setOfferStatus(prev => prev[k] ? prev : Object.assign({}, prev, { [k]: "in_progress" })); };

  const completeOffer = (categoryId, offer) => {
    const key = statusKey(categoryId, offer.id);
    const rewardTotal = offer.tiers.reduce((s, t) => s + t.reward, 0);
    setOfferStatus(prev => Object.assign({}, prev, { [key]: "completed" }));
    setBalance(b => Math.round((b + rewardTotal) * 100) / 100);
    setTransactions(prev => [{ id: "txn-" + Date.now(), label: offer.name + " — offer completed", date: "Just now", amount: rewardTotal }].concat(prev));
  };
  const expireOffer = (categoryId, offerId) => { const key = statusKey(categoryId, offerId); setOfferStatus(prev => Object.assign({}, prev, { [key]: "expired" })); };

  const offersByStatusForCategory = (categoryId) => {
    const all = OFFERS[categoryId] || [];
    const live = [], inProgress = [], completed = [], expired = [];
    for (const offer of all) {
      const s = getOfferStatus(categoryId, offer.id);
      if (s === "completed") completed.push(offer);
      else if (s === "expired") expired.push(offer);
      else if (s === "in_progress") inProgress.push(offer);
      else live.push(offer);
    }
    return { live, inProgress, completed, expired };
  };

  const value = { phone, isAuthenticated, login, logout, name, setName, photo, setPhoto, email, setEmail,
    emailStatus, setEmailStatus, emailResendIn, setEmailResendIn, dob, setDob, dobLocked, setDobLocked,
    gender, setGender, balance, transactions, getOfferStatus, markInProgress, completeOffer, expireOffer, offersByStatusForCategory };

  return <AppStateContext.Provider value={value}>{children}</AppStateContext.Provider>;
}

function Login() {

  const otpRefs = useRef([]);

  useEffect(() => {
    if (resendIn <= 0) return;
    const id = setTimeout(() => setResendIn(s => s - 1), 1000);
    return () => clearTimeout(id);
  }, [resendIn]);

  const requestOtp = () => {
    if (!/^[6-9]\d{9}$/.test(phone)) { setError("Enter a valid 10-digit mobile number."); return; }
    setError("");
    // TODO: POST /auth/otp/request { phone } — server also runs VPN/device checks here.
    setStep("otp"); setResendIn(60);
    setTimeout(() => { if (otpRefs.current[0]) otpRefs.current[0].focus(); }, 50);
  };
  const setDigit = (i, v) => {
    if (!/^\d?$/.test(v)) return;
    const next = otp.slice(); next[i] = v; setOtp(next);
    if (v && i < 5 && otpRefs.current[i + 1]) otpRefs.current[i + 1].focus();
  };
  const onOtpKey = (i, e) => { if (e.key === "Backspace" && !otp[i] && i > 0 && otpRefs.current[i - 1]) otpRefs.current[i - 1].focus(); };
  const verify = () => {
    const code = otp.join("");
    if (code.length !== 6) { setError("Enter the 6-digit code."); return; }
    setError("");
    // TODO: POST /auth/otp/verify { phone, code } → session token.
    login(phone); navigate("/", { replace: true });
  };

  return (
    <div className="login-screen">

            <div className="phone-row">
              <span className="cc">+91</span>
              <input id="phone" className="input" type="tel" inputMode="numeric" maxLength={10} placeholder="10-digit number"
                value={phone} onChange={e => setPhone(e.target.value.replace(/\D/g, ""))} onKeyDown={e => { if (e.key === "Enter") requestOtp(); }} />
            </div>
            {error && <p className="error-text" role="alert">{error}</p>}
            <button className="btn block" style={{ marginTop: 20 }} onClick={requestOtp}>Send OTP <Icon.Arrow /></button>
            <p className="login-legal">By continuing you agree to the Terms &amp; Conditions and Privacy Policy.</p>
          </React.Fragment>
        ) : (

            <button className="back-link" onClick={() => { setStep("phone"); setOtp(["","","","","",""]); setError(""); }}><Icon.Back /> Change number</button>
            <h1 className="serif login-h">Verify OTP</h1>
            <p className="sub">Code sent to <span className="mono">+91 {phone}</span></p>
            <div className="otp-row">
              {otp.map((d, i) => (
                <input key={i} ref={el => { otpRefs.current[i] = el; }} className="otp-box" type="tel" inputMode="numeric" maxLength={1}
                  value={d} aria-label={"Digit " + (i + 1)} onChange={e => setDigit(i, e.target.value)} onKeyDown={e => onOtpKey(i, e)} />
              ))}

function SecurityCheck({ params }) {
  const categoryId = params.categoryId, offerId = params.offerId;
  const { markInProgress } = useAppState();
  const offer = findOffer(categoryId, offerId);
  const CHECKS = ["Checking for VPN or proxy connections", "Verifying this isn't an automated session", "Confirming device integrity"];
  const [step, setStep] = useState(0);
  const [blocked, setBlocked] = useState(false);
  const simulateBlockRef = useRef(false);
  const [simulateBlock, setSimulateBlock] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => { simulateBlockRef.current = simulateBlock; }, [simulateBlock]);

  useEffect(() => {
    if (!offer) return;
    const stepTimers = CHECKS.map((_, i) => setTimeout(() => setStep(i + 1), (i + 1) * (5000 / CHECKS.length)));
    const finalTimer = setTimeout(() => {
      if (simulateBlockRef.current) { setBlocked(true); }
      else {
        setDone(true);
        markInProgress(categoryId, offer.id);
        window.open(offer.trackingLink + "mgusr123", "_blank", "noopener,noreferrer");
      }
    }, 5000);
    return () => { stepTimers.forEach(clearTimeout); clearTimeout(finalTimer); };
  }, []);

  if (!offer) return <div className="page"><p className="sub">This offer doesn't exist.</p></div>;
  if (blocked) return (
    <div className="page fade-up security-page">
      <div className="security-icon blocked"><Icon.ShieldAlert width={26} height={26} /></div>
      <h1 className="serif h1" style={{ textAlign: "center" }}>This session couldn't be verified</h1>
      <p className="sub" style={{ textAlign: "center" }}>We couldn't confirm this connection is safe to redirect from. Disable any VPN or proxy and try again.</p>
      <button className="btn block" onClick={() => navigate("/offers/" + categoryId + "/" + offer.id)}>Go back</button>
    </div>
  );
  return (
    <div className="page fade-up security-page">

function computeStrength(s) {
  const checks = [Boolean(s.name.trim()), s.phoneVerified, s.emailVerified, s.dobSet, Boolean(s.gender), Boolean(s.photo)];
  return Math.round((checks.filter(Boolean).length / checks.length) * 100);
}

function ProfilePage() {
  const st = useAppState();
  const [saved, setSaved] = useState(false);
  const fileRef = useRef(null);

  useEffect(() => {
    const token = new URLSearchParams(window.location.search).get("emailVerifyToken");
    if (token) {
      // TODO: POST /me/email/confirm { token }
      st.setEmailStatus("verified");
      window.history.replaceState({}, "", window.location.pathname + window.location.hash);
    }
  }, []);
  useEffect(() => {
    if (st.emailResendIn <= 0) return;
    const id = setTimeout(() => st.setEmailResendIn(s => s - 1), 1000);
    return () => clearTimeout(id);
  }, [st.emailResendIn]);

  const sendVerification = () => {
    if (!isValidEmail(st.email) || st.emailResendIn > 0) return;
    // TODO: POST /me/email/verify-request { email }
    st.setEmailStatus("pending"); st.setEmailResendIn(60);
  };
  const pickPhoto = (e) => { const f = e.target.files && e.target.files[0]; if (!f) return; st.setPhoto(URL.createObjectURL(f)); };
  const save = () => { if (st.dob) st.setDobLocked(true); setSaved(true); setTimeout(() => setSaved(false), 1800); };
  const strength = computeStrength({ name: st.name, phoneVerified: true, emailVerified: st.emailStatus === "verified", dobSet: st.dobLocked, gender: st.gender, photo: st.photo });

  return (
    <div className="page fade-up">
      <PageHeader title="Profile" />
      <div className="avatar-block">
        <div className="avatar-circle" style={st.photo ? { backgroundImage: "url(" + st.photo + ")" } : undefined}>{!st.photo && <Icon.User width={30} height={30} />}</div>
        <button className="avatar-pencil" aria-label="Change photo" onClick={() => { if (fileRef.current) fileRef.current.click(); }}><Icon.Pencil width={13} height={13} /></button>
        <input ref={fileRef} type="file" accept="image/*" hidden onChange={pickPhoto} />
      </div>
      <div className="profile-strength"><span>Profile strength</span><span className="profile-strength-pill">{strength}% complete</span></div>
      <label className="field-label">Full name</label>
      <input className="input" value={st.name} onChange={e => st.setName(e.target.value)} />
      <label className="field-label" style={{ marginTop: 16 }}>Mobile number</label>
      <div className="locked-field"><span className="mono">+91 {formatPhone(st.phone)}</span><span className="verified-pill">Verified</span></div>
      <p className="field-hint">Verified when you signed in with OTP — it can't be changed here.</p>
      <label className="field-label" style={{ marginTop: 16 }}>Email</label>
      {st.emailStatus === "verified" ? (
        <React.Fragment>
          <div className="locked-field"><span>{st.email}</span><span className="verified-pill">Verified</span></div>
          <p className="field-hint">Verified — it can't be changed here.</p>
        </React.Fragment>
      ) : st.emailStatus === "pending" ? (
        <div className="email-pending">
          <Icon.Mail width={18} height={18} />
          <div>
            <div style={{ fontWeight: 600, fontSize: 13.5 }}>Check your inbox</div>
            <div className="field-hint" style={{ margin: "3px 0 8px" }}>We sent a confirmation link to <strong>{st.email}</strong>. Click it to verify.</div>
            <button className="resend-link" style={{ margin: 0 }} disabled={st.emailResendIn > 0} onClick={sendVerification}>
              {st.emailResendIn > 0 ? "Resend link in " + st.emailResendIn + "s" : "Resend link"}
            </button>
            {/* DEV PREVIEW ONLY — remove once the real email + redirect flow is wired to a backend. */}
            <button className="resend-link" style={{ margin: "6px 0 0", color: "var(--ink-soft)" }} onClick={() => st.setEmailStatus("verified")}>
              Simulate confirmation click (preview only)
            </button>
          </div>
        </div>
      ) : (
        <React.Fragment>
          <div className="email-row">
            <input className="input" type="email" placeholder="you@example.com" value={st.email} onChange={e => st.setEmail(e.target.value)} />
            <button className="btn" style={{ padding: "0 18px" }} disabled={!isValidEmail(st.email)} onClick={sendVerification}>Verify</button>
          </div>
          <p className="field-hint">We'll email a confirmation link — click it to verify.</p>
        </React.Fragment>
      )}
      <label className="field-label" style={{ marginTop: 16 }}>Date of birth</label>
      {st.dobLocked ? (
        <React.Fragment>
          <div className="locked-field"><span>{new Date(st.dob).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</span><span className="verified-pill">Saved</span></div>
          <p className="field-hint">Set once and locked — contact support to change it.</p>
        </React.Fragment>
      ) : (
        <input className="input" type="date" value={st.dob} onChange={e => st.setDob(e.target.value)} />
      )}
      <label className="field-label" style={{ marginTop: 16 }}>Gender</label>
      <div className="gender-row">
        {["male", "female"].map(g => <button key={g} className={"gender-pill" + (st.gender === g ? " on" : "")} onClick={() => st.setGender(g)}>{g === "male" ? "Male" : "Female"}</button>)}
      </div>
      <button className="btn block" style={{ marginTop: 24 }} onClick={save}>{saved ? "Saved" : "Save changes"} {saved ? <Icon.Check /> : <Icon.Arrow />}</button>
    </div>
  );
}

/* ============================== Route table ============================== */
const ROUTES = [
  { pattern: "/", render: () => <Home /> },
  { pattern: "/offers/:categoryId", render: (p) => <CategoryListing params={p} /> },
  { pattern: "/offers/:categoryId/:offerId", render: (p) => <OfferDetail params={p} /> },
  { pattern: "/offers/:categoryId/:offerId/security-check", render: (p) => <SecurityCheck params={p} /> },
  { pattern: "/wallet", render: () => <WalletPage /> },
  { pattern: "/share", render: () => <ShareEarnPage /> },
  { pattern: "/share/:offerId", render: (p) => <OfferActivityPage params={p} /> },
  { pattern: "/profile", render: () => <ProfilePage /> },
  { pattern: "/activity", render: () => <ActivityPage /> },
  { pattern: "/notifications", render: () => <NotificationsPage /> },
  { pattern: "/support/feedback", render: () => <FeedbackContactPage mode="feedback" /> },
  { pattern: "/support/contact", render: () => <FeedbackContactPage mode="contact" /> },
  { pattern: "/support/faqs", render: () => <FaqsPage /> },
  { pattern: "/legal/privacy", render: () => <LegalPage title="Privacy policy" /> },
  { pattern: "/legal/terms", render: () => <LegalPage title="Terms & conditions" /> },
];

function AppRouter() {
  const path = useRoute();
  const { isAuthenticated } = useAppState();
  const splashShown = getSplashShown();

  let redirect = null;
  if (path === "/login" && isAuthenticated) redirect = "/";
  else if (path !== "/login" && splashShown && !isAuthenticated) redirect = "/login";

  useEffect(() => { if (redirect) navigate(redirect, { replace: true }); }, [redirect, path]);

  if (path === "/login" && !isAuthenticated) return <Login />;
  if (!splashShown) return <Splash />;
  if (redirect) return null;

  let content = null;
  for (const route of ROUTES) {
    const params = matchPath(route.pattern, path);
    if (params) { content = route.render(params); break; }
  }
  if (!content) content = <NotFoundPage />;

  // Keyed by path so page state (tabs, timers) resets on navigation.
  return <AppLayout path={path}>{React.cloneElement(content, { key: path })}</AppLayout>;
}

function App() {
  return (
    <AppStateProvider>
      <AppRouter />
    </AppStateProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
